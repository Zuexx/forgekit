name: forgekit

services:
  postgres:
    image: postgres:17-alpine
    container_name: forgekit-postgres
    environment:
      POSTGRES_DB: forgekit
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d forgekit"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - forgekit-postgres-data:/var/lib/postgresql/data

volumes:
  forgekit-postgres-data:
